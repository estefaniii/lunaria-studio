  <style>
    .e404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-12) var(--content-padding);
      position: relative;
      overflow: hidden;
    }
    .e404-orbs {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
    }
    .e404-orbs .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .e404-orbs .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #7C3AED, transparent 70%); top: -10%; left: -10%; opacity: 0.5; animation: orbFloat1 14s ease-in-out infinite; }
    .e404-orbs .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #F0ABFC, transparent 70%); bottom: -10%; right: -10%; opacity: 0.4; animation: orbFloat2 16s ease-in-out infinite; }
    .e404-content { position: relative; z-index: 1; max-width: 700px; }
    .e404-number {
      font-family: var(--font-display);
      font-size: clamp(8rem, 6rem + 12vw, 18rem);
      font-weight: 400;
      letter-spacing: -0.06em;
      line-height: 0.85;
      background: var(--gradient-aurora);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin: 0;
      filter: drop-shadow(0 0 40px rgba(167, 139, 250, 0.3));
    }
    .e404-moon {
      width: clamp(80px, 14vw, 140px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--gradient-luna);
      margin: var(--space-6) auto;
      box-shadow: 0 0 80px rgba(232, 228, 243, 0.4), inset -16px -16px 40px rgba(124, 58, 237, 0.4);
      position: relative;
      animation: floatY 6s ease-in-out infinite;
    }
    .e404-moon::before, .e404-moon::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(124, 58, 237, 0.18);
    }
    .e404-moon::before { top: 25%; left: 25%; width: 16%; height: 16%; box-shadow: 26px 12px 0 -2px rgba(124,58,237,0.14); }
    .e404-moon::after { top: 60%; left: 55%; width: 12%; height: 12%; }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    .e404-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 1.2rem + 2vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      margin: var(--space-6) 0 var(--space-4);
